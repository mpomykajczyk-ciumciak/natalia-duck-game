<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦆 Natalia Duck Game - Ponatkuj!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Trebuchet MS', cursive;
            background: linear-gradient(135deg, #1a4d3a 0%, #2d6b4f 50%, #8b5a3c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #87ceeb 0%, #e8f4f8 100%);
            border: 5px solid #2d4a2b;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        #gameArea {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(to bottom, #a8d5ff 0%, #fff5e6 100%);
        }

        #duck {
            position: absolute;
            width: 50px;
            height: 50px;
            left: 50px;
            top: 250px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .obstacle {
            position: absolute;
            width: 60px;
            height: 120px;
            background: linear-gradient(to right, #ff69b4, #ffb6c1);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #2d4a2b;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        #gameOverScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            gap: 20px;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #finalScore {
            font-size: 48px;
            font-weight: bold;
            color: #2d4a2b;
        }

        #restartBtn {
            padding: 15px 30px;
            font-size: 24px;
            background: linear-gradient(135deg, #2d6b4f, #1a4d3a);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #restartBtn:hover {
            transform: scale(1.1);
        }

        #eatingAnimation {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 90;
            display: none;
        }

        #eatingAnimation.show {
            display: block;
        }

        .eat-effect {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            animation: eat 1.5s ease-out forwards;
        }

        @keyframes eat {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: scale(0.1) translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        .eating-element {
            animation: disappear 0.8s ease-out forwards;
        }

        @keyframes disappear {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        #gasCloud {
            position: absolute;
            width: 200px;
            height: 150px;
            bottom: 0;
            right: -50px;
            background: radial-gradient(circle, rgba(100, 200, 100, 0.7) 0%, rgba(100, 200, 100, 0.3) 100%);
            border-radius: 50%;
            display: none;
            z-index: 80;
            animation: gasFloat 2s ease-out forwards;
        }

        #gasCloud.show {
            display: block;
        }

        @keyframes gasFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) translateX(100px);
                opacity: 0;
            }
        }

        #wink {
            position: absolute;
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 85;
            font-size: 200px;
        }

        #wink.show {
            display: block;
            animation: winkBounce 1s ease-out;
        }

        @keyframes winkBounce {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameArea">
            <div id="score">Punkty: 0</div>
            <div id="duck"></div>
            <div id="gameOverScreen">
                <div id="finalScore"></div>
                <button id="restartBtn">Ponatkuj ponownie</button>
            </div>
            <div id="eatingAnimation"></div>
            <div id="wink">😉</div>
            <div id="gasCloud"></div>
        </div>
    </div>

    <script>
        // ===============================================
        // ZMIENNE GRY
        // ===============================================
        
        const gameContainer = document.getElementById('gameContainer');
        const gameArea = document.getElementById('gameArea');
        const duck = document.getElementById('duck');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const eatingAnimation = document.getElementById('eatingAnimation');
        const wink = document.getElementById('wink');
        const gasCloud = document.getElementById('gasCloud');

        let score = 0;
        let gameRunning = false;
        let gameStarted = false;
        let duckY = 250;
        let duckVelocity = 0;
        const gravity = 0.4;  // Wolniejszy spad (było 0.6)
        const jumpPower = -15;  // Wyższy skok (było -12)
        const gameWidth = 400;
        const gameHeight = 600;

        // Audio context do tworzenia dźwięków
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // ===============================================
        // GENEROWANIE DŹWIĘKÓW (kacze odgłosy)
        // ===============================================

        function playQuack() {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(400, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.3);
        }

        function playFly() {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(600, audioContext.currentTime);
            gain.gain.setValueAtTime(0.2, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.15);
        }

        function playCollision() {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(150, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.2);
        }

        function playEating() {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.setValueAtTime(300 + i * 100, audioContext.currentTime);
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    osc.start(audioContext.currentTime);
                    osc.stop(audioContext.currentTime + 0.1);
                }, i * 100);
            }
        }

        function playFart() {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(100, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.8);
            gain.gain.setValueAtTime(0.4, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.8);
        }

        // ===============================================
        // RYSOWANIE KACZKI (SVG)
        // ===============================================

        function drawDuck() {
            const svg = `<svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="25" cy="30" rx="15" ry="18" fill="white" stroke="#333" stroke-width="1"/>
                <circle cx="30" cy="15" rx="12" ry="14" fill="white" stroke="#333" stroke-width="1"/>
                <circle cx="38" cy="12" rx="6" ry="7" fill="#ffa500" stroke="#333" stroke-width="0.5"/>
                <circle cx="40" cy="11" rx="2" ry="2.5" fill="black"/>
                <path d="M 42 18 L 45 20 L 42 19 Z" fill="#ff8c00"/>
            </svg>`;
            duck.style.backgroundImage = `url('data:image/svg+xml,${encodeURIComponent(svg)}')`;
        }

        // ===============================================
        // RYSOWANIE KWIATKA (przeszkoda)
        // ===============================================

        function drawFlower() {
            const svg = `<svg width="60" height="120" viewBox="0 0 60 120" xmlns="http://www.w3.org/2000/svg">
                <line x1="30" y1="60" x2="30" y2="120" stroke="#228B22" stroke-width="3"/>
                <circle cx="30" cy="40" r="8" fill="#2d6b4f"/>
                <circle cx="20" cy="35" r="10" fill="#ff69b4"/>
                <circle cx="40" cy="35" r="10" fill="#ff1493"/>
                <circle cx="25" cy="25" r="10" fill="#ffb6c1"/>
                <circle cx="35" cy="25" r="10" fill="#ff69b4"/>
                <circle cx="30" cy="20" r="10" fill="#ffb6c1"/>
            </svg>`;
            return `url('data:image/svg+xml,${encodeURIComponent(svg)}')`;
        }

        // ===============================================
        // INICJALIZACJA
        // ===============================================

        drawDuck();

        // ===============================================
        // STEROWANIE GRACZEM
        // ===============================================

        document.addEventListener('click', () => {
            if (!gameStarted) {
                gameStarted = true;
                gameRunning = true;
            }
            if (gameRunning) {
                duckVelocity = jumpPower;
                playFly();
            }
        });

        document.addEventListener('touchstart', () => {
            if (!gameStarted) {
                gameStarted = true;
                gameRunning = true;
            }
            if (gameRunning) {
                duckVelocity = jumpPower;
                playFly();
            }
        });

        // ===============================================
        // OBIEKTY PRZESZKÓD
        // ===============================================

        let obstacles = [];
        let obstacleCounter = 0;

        function createObstacle() {
            const gap = 150;  // Większa szpara (było 100)
            const minHeight = 50;
            const maxHeight = gameHeight - gap - minHeight;
            const obstacleHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.style.backgroundImage = drawFlower();
            obstacle.style.left = gameWidth + 'px';
            obstacle.style.top = obstacleHeight + 'px';
            gameArea.appendChild(obstacle);

            obstacles.push({
                element: obstacle,
                x: gameWidth,
                y: obstacleHeight,
                scored: false
            });
        }

        // ===============================================
        // GŁÓWNA PĘTLA GRY
        // ===============================================

        function gameLoop() {
            if (!gameRunning) return;

            // Fizyka - spad kaczki
            duckVelocity += gravity;
            duckY += duckVelocity;
            duck.style.top = duckY + 'px';

            // Sprawdzenie czy kaczka wyleciała
            if (duckY > gameHeight - 50 || duckY < 0) {
                endGame();
                return;
            }

            // Tworzenie przeszkód
            obstacleCounter++;
            if (obstacleCounter > 150) {  // Przeszkody rzadsze (było 120)
                createObstacle();
                obstacleCounter = 0;
            }

            // Aktualizacja przeszkód
            obstacles.forEach((obs, index) => {
                obs.x -= 3;  // Wolniejsze przeszkody (było 5)
                obs.element.style.left = obs.x + 'px';

                // Sprawdzenie kolizji
                if (checkCollision(obs)) {
                    playCollision();
                    endGame();
                    return;
                }

                // Sprawdzenie punktu
                if (!obs.scored && obs.x < 50) {
                    score++;
                    scoreDisplay.textContent = `Punkty: ${score}`;
                    obs.scored = true;
                }

                // Usunięcie przeszkody
                if (obs.x < -60) {
                    obs.element.remove();
                    obstacles.splice(index, 1);
                }
            });

            requestAnimationFrame(gameLoop);
        }

        // ===============================================
        // KOLIZJE
        // ===============================================

        function checkCollision(obstacle) {
            const duckRect = {
                left: 50,
                right: 50 + 50,
                top: duckY,
                bottom: duckY + 50
            };

            const obsRect = {
                left: obstacle.x,
                right: obstacle.x + 60,
                top: obstacle.y,
                bottom: obstacle.y + 120
            };

            return duckRect.left < obsRect.right &&
                   duckRect.right > obsRect.left &&
                   duckRect.top < obsRect.bottom &&
                   duckRect.bottom > obsRect.top;
        }

        // ===============================================
        // KONIEC GRY - CHAOS!
        // ===============================================

        function endGame() {
            gameRunning = false;
            playEating();

            // Ukryj przeszkody
            obstacles.forEach(obs => obs.element.style.display = 'none');

            // Animacja - Natalia zjada stronę
            setTimeout(() => {
                startEatingPhase();
            }, 500);
        }

        function startEatingPhase() {
            playEating();

            // Elementy do zjedzenia
            const elementsToEat = document.querySelectorAll('#score, #duck');
            let eaten = 0;

            elementsToEat.forEach((element, index) => {
                setTimeout(() => {
                    element.classList.add('eating-element');
                    playEating();
                    eaten++;

                    if (eaten === elementsToEat.length) {
                        setTimeout(() => {
                            showFinalPhase();
                        }, 500);
                    }
                }, index * 300);
            });
        }

        function showFinalPhase() {
            // Bąk + zielona chmura
            playFart();
            gasCloud.classList.add('show');

            // Oczko po 1 sekundzie
            setTimeout(() => {
                wink.classList.add('show');
            }, 500);

            // Game Over screen
            setTimeout(() => {
                gameArea.style.background = 'white';
                gameOverScreen.classList.add('show');
                finalScoreDisplay.textContent = `Wynik: ${score}`;
            }, 2000);
        }

        // ===============================================
        // RESTART
        // ===============================================

        restartBtn.addEventListener('click', () => {
            location.reload();
        });

        // ===============================================
        // START GRY
        // ===============================================

        gameLoop();
    </script>
</body>
</html>
